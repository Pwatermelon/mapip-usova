# Деплой: архив с корня репозитория MAPIP → на сервере чистая распаковка (без git clone на сервере).
name: Deploy (build on host)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack stack (microservices + Flask)
        run: |
          tar --exclude='mapip-core/.venv' \
              --exclude='MapApplication-master/FlaskApi/venv' \
              --exclude='mapip-web/node_modules' \
              --exclude='.git' \
              -czf deploy.tar.gz \
              docker-compose.yml \
              mapip-core \
              mapip-routing-service \
              mapip-web \
              MapApplication-master/FlaskApi \
              data

      - name: Ensure deploy directory on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: mkdir -p ${{ secrets.DEPLOY_PATH }}

      - name: Copy archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy.tar.gz"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Clean old deploy, extract, build, run
        env:
          OPENROUTE_API_KEY: ${{ secrets.OPENROUTE_API_KEY }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: OPENROUTE_API_KEY
          # docker compose build --no-cache на VPS часто > 30 мин (Flask: spacy/scikit-surprise и т.д.)
          command_timeout: 90m
          script: |
            set -euo pipefail
            DEPLOY="${{ secrets.DEPLOY_PATH }}"
            cd "$DEPLOY"

            # Используем только docker compose v2.
            # docker-compose v1 падает с KeyError: 'ContainerConfig' на recreate.
            if docker compose version >/dev/null 2>&1; then
              compose() { docker compose "$@"; }
            else
              echo "Нужен Docker Compose v2 (docker compose plugin). docker-compose v1 не поддерживается." >&2
              exit 1
            fi

            # 1) Остановить прежний стек (тома БД без -v)
            if [ -f docker-compose.yml ]; then
              compose down --remove-orphans || true
            fi
            # На всякий случай удаляем контейнеры текущего compose-проекта,
            # чтобы не было конфликтов с метаданными старых образов.
            docker ps -aq --filter "label=com.docker.compose.project" | xargs -r docker rm -f || true

            # 2) Снести артефакты прошлого деплоя
            rm -rf mapip-core mapip-routing-service mapip-web MapApplication-master data
            rm -f docker-compose.yml

            # 3) Распаковка
            tar -xzf deploy.tar.gz
            export OPENROUTE_API_KEY

            # 4) Сборка: --no-cache есть только у нормального compose build; иначе --pull
            if compose build --help 2>&1 | grep -q -- '--no-cache'; then
              compose build --no-cache
            else
              compose build --pull || compose build
            fi

            compose up -d --remove-orphans

            docker image prune -f
            rm -f deploy.tar.gz
