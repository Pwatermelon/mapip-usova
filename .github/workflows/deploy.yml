# Деплой: архив с корня репозитория MAPIP → на сервере чистая распаковка (без git clone на сервере).
name: Deploy (build on host)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack stack (microservices + Flask)
        run: |
          tar --exclude='mapip-core/.venv' \
              --exclude='MapApplication-master/FlaskApi/venv' \
              --exclude='mapip-web/node_modules' \
              --exclude='.git' \
              -czf deploy.tar.gz \
              docker-compose.yml \
              mapip-core \
              mapip-routing-service \
              mapip-web \
              MapApplication-master/FlaskApi \
              data

      - name: Ensure deploy directory on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: mkdir -p ${{ secrets.DEPLOY_PATH }}

      - name: Copy archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy.tar.gz"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Clean old deploy, extract, build, run
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY="${{ secrets.DEPLOY_PATH }}"
            cd "$DEPLOY"

            # 1) Остановить прежний стек, пока на месте старый compose (тома БД не трогаем — без -v)
            if [ -f docker-compose.yml ]; then
              docker compose down --remove-orphans || true
            fi

            # 2) Снести артефакты прошлого деплоя (остатки старых путей, полустёртые каталоги)
            rm -rf mapip-core mapip-routing-service mapip-web MapApplication-master data
            rm -f docker-compose.yml

            # 3) Свежий архив уже залит scp — распаковываем с нуля
            tar -xzf deploy.tar.gz

            export OPENROUTE_API_KEY='${{ secrets.OPENROUTE_API_KEY }}'

            docker compose build --no-cache
            docker compose up -d

            # 4) Подчистить висячие образы после сборки (не трогает используемые контейнеры)
            docker image prune -f

            # архив на сервере можно убрать, следующий деплой снова зальёт
            rm -f deploy.tar.gz
