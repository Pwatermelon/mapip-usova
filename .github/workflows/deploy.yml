# Деплой: копируем код на сервер, сборка и запуск через docker-compose на хосте
name: Deploy (build on host)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Docker context (clientapp inside MapApi)
        run: cp -r MapApplication-master/clientapp MapApplication-master/MapApi/

      - name: Pack project (exclude junk)
        run: |
          tar --exclude='MapApplication-master/clientapp/node_modules' \
              --exclude='MapApplication-master/MapApi/clientapp/node_modules' \
              --exclude='MapApplication-master/MapApi/bin' \
              --exclude='MapApplication-master/MapApi/obj' \
              --exclude='.git' \
              -czf deploy.tar.gz MapApplication-master

      - name: Create directory on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: mkdir -p ${{ secrets.DEPLOY_PATH }}
        continue-on-error: true

      - name: Copy archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy.tar.gz"
          target: ${{ secrets.DEPLOY_PATH }}
        continue-on-error: true

      - name: Build and run on server (docker-compose build + up)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            tar -xzf deploy.tar.gz
            cd MapApplication-master
            docker-compose build --no-cache
            docker-compose up -d
        continue-on-error: true
