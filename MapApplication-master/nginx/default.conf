server {
    listen 80;
    server_name _;

    # Всё, что не является комментариями/рекомендациями — проксируем в ASP.NET API.
    location / {
        proxy_pass http://webapi:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Flask-сервис комментариев.
    location /comments/ {
        proxy_pass http://flask:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Flask-сервис рекомендаций.
    location /recommendations/ {
        proxy_pass http://flask:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Т.к. ASP.NET роуты начинаются с /api/, оставляем отдельное правило,
    # чтобы не было неочевидных конфликтов.
    location /api/ {
        proxy_pass http://webapi:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Статика клиентского приложения (роуты вида /clientapp/...)
    # обслуживается ASP.NET приложением, но nginx всё равно проксирует запросы в webapi.
    location /clientapp/ {
        proxy_pass http://webapi:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

